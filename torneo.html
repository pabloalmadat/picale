<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>DUO PADEL — Torneo en Vivo</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.8/dist/hls.min.js"></script>
<style>
:root{
  --ink:#080809;--ink1:#0E0E10;--ink2:#141416;--ink3:#1A1A1C;--ink4:#222224;
  --wire:rgba(255,255,255,.055);--wire2:rgba(255,255,255,.1);--wire3:rgba(255,255,255,.18);
  --chalk:#F4F0E8;--chalk2:rgba(244,240,232,.55);--chalk3:rgba(244,240,232,.3);--chalk4:rgba(244,240,232,.15);
  --neon:#E8FF47;--neon2:rgba(232,255,71,.12);--neon3:rgba(232,255,71,.06);
  --red:#FF4545;--red2:rgba(255,69,69,.15);
  --blue:#47AAFF;--blue2:rgba(71,170,255,.12);
  --f:Oswald,sans-serif;--fb:'IBM Plex Sans',sans-serif;--fm:'IBM Plex Mono',monospace;
  --safe-b:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{overflow-x:hidden;scroll-behavior:smooth;}
body{background:var(--ink);color:var(--chalk);font-family:var(--fb);-webkit-font-smoothing:antialiased;min-height:100vh;}

.nav{position:sticky;top:0;z-index:200;background:rgba(8,8,9,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--wire);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;}
.nav-brand{display:flex;align-items:center;gap:10px;}
.nav-logo{font-family:var(--f);font-size:17px;font-weight:600;letter-spacing:3px;}
.nav-dot{width:7px;height:7px;border-radius:50%;background:var(--neon);}
.nav-clock{font-family:var(--fm);font-size:14px;color:var(--chalk2);}

/* HERO */
.hero{position:relative;overflow:hidden;background:var(--ink1);border-bottom:1px solid var(--wire);}
.hero-bg{position:absolute;inset:0;background-image:linear-gradient(var(--wire) 1px,transparent 1px),linear-gradient(90deg,var(--wire) 1px,transparent 1px);background-size:40px 40px;opacity:.4;}
.hero-glow{position:absolute;top:-40%;left:50%;transform:translateX(-50%);width:120%;height:120%;background:radial-gradient(ellipse,rgba(232,255,71,.04) 0%,transparent 60%);}
.hero-body{position:relative;z-index:2;padding:24px 20px 20px;}
.live-eyebrow{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.live-pill{display:flex;align-items:center;gap:6px;padding:4px 12px;background:var(--red2);border:1px solid rgba(255,69,69,.3);border-radius:3px;}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--red);animation:pulse 1.4s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.live-txt{font-family:var(--fm);font-size:9px;letter-spacing:2px;color:var(--red);}
.live-court-badge{font-family:var(--fm);font-size:9px;letter-spacing:2px;color:var(--chalk3);padding:4px 10px;border:1px solid var(--wire2);border-radius:3px;}
.hero-cat{font-family:var(--fm);font-size:10px;letter-spacing:2px;color:var(--neon);text-transform:uppercase;margin-bottom:6px;}
.hero-match-name{font-family:var(--f);font-size:clamp(18px,4.5vw,36px);font-weight:600;text-transform:uppercase;letter-spacing:.5px;line-height:1.1;margin-bottom:4px;}
.hero-group{font-family:var(--fm);font-size:10px;color:var(--chalk3);letter-spacing:2px;margin-bottom:16px;}
.hero-teams{display:flex;flex-direction:column;gap:0;}
.hero-team{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--wire);}
.hero-team:last-child{border-bottom:none;}
.team-side{font-family:var(--fm);font-size:9px;letter-spacing:2px;color:var(--chalk4);min-width:24px;margin-top:3px;}
.team-player{font-family:var(--f);font-size:clamp(13px,3vw,18px);font-weight:500;letter-spacing:.3px;line-height:1.4;}
.vs-div{display:flex;align-items:center;gap:10px;padding:6px 0;}
.vs-line{flex:1;height:1px;background:var(--wire);}
.vs-txt{font-family:var(--f);font-size:10px;letter-spacing:3px;color:var(--chalk4);}
.hero-time{display:flex;align-items:center;gap:8px;margin-top:14px;padding-top:14px;border-top:1px solid var(--wire);}
.hero-time-val{font-family:var(--fm);font-size:13px;color:var(--neon);}
.hero-time-end{font-family:var(--fm);font-size:11px;color:var(--chalk3);}
.no-live{padding:40px 20px;text-align:center;}
.no-live-icon{font-size:32px;margin-bottom:10px;opacity:.3;}
.no-live-txt{font-family:var(--f);font-size:16px;color:var(--chalk3);letter-spacing:1px;}
.no-live-sub{font-size:12px;color:var(--chalk4);margin-top:4px;}

/* COURT SELECTOR */
.courts-section{padding:20px 20px 0;}
.section-label{font-family:var(--fm);font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--chalk3);margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.section-label::after{content:'';flex:1;height:1px;background:var(--wire);}
.courts-scroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;}
.courts-scroll::-webkit-scrollbar{display:none;}
.court-card{flex-shrink:0;width:150px;background:var(--ink2);border:1px solid var(--wire);border-radius:10px;overflow:hidden;cursor:pointer;transition:all .25s;position:relative;}
.court-card.active{border-color:var(--neon);}
.court-card.active .court-indicator{background:var(--neon);}
.court-indicator{position:absolute;top:0;left:0;right:0;height:2px;background:var(--wire);transition:background .25s;}
.court-thumb{height:72px;background:#2DB34A;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.court-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:14px 14px;}
.court-lines-svg{width:60%;height:55%;border:1px solid rgba(255,255,255,.12);position:relative;}
.court-lines-svg::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:rgba(255,255,255,.12);}
.court-lines-svg::after{content:'';position:absolute;left:50%;top:0;bottom:0;width:1px;background:rgba(255,255,255,.12);}
.court-live-tag{position:absolute;top:6px;left:6px;display:flex;align-items:center;gap:4px;padding:2px 6px;background:var(--red2);border:1px solid rgba(255,69,69,.3);border-radius:2px;}
.court-live-dot{width:4px;height:4px;border-radius:50%;background:var(--red);animation:pulse 1.4s infinite;}
.court-live-label{font-family:var(--fm);font-size:7px;color:var(--red);}
.court-info{padding:8px 10px;}
.court-name{font-family:var(--f);font-size:14px;font-weight:500;letter-spacing:.5px;margin-bottom:2px;}
.court-sub{font-size:10px;color:var(--chalk3);}

/* TABS */
.stream-section{padding:16px 20px;}
.tabs{display:flex;background:var(--ink2);border:1px solid var(--wire);border-radius:8px;overflow:hidden;margin-bottom:14px;}
.tab{flex:1;padding:10px;font-family:var(--f);font-size:12px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:var(--chalk3);cursor:pointer;text-align:center;transition:all .2s;border:none;background:none;}
.tab.active{background:var(--ink4);color:var(--chalk);}

/* STREAM */
.stream-wrap{aspect-ratio:16/9;background:#000;border-radius:10px;overflow:hidden;position:relative;border:1px solid var(--wire);}
#liveVideo{width:100%;height:100%;object-fit:contain;}
.sc{position:absolute;width:22px;height:22px;opacity:.4;}
.sc.tl{top:10px;left:10px;border-top:1px solid var(--neon);border-left:1px solid var(--neon);}
.sc.tr{top:10px;right:10px;border-top:1px solid var(--neon);border-right:1px solid var(--neon);}
.sc.bl{bottom:10px;left:10px;border-bottom:1px solid var(--neon);border-left:1px solid var(--neon);}
.sc.br{bottom:10px;right:10px;border-bottom:1px solid var(--neon);border-right:1px solid var(--neon);}
.fs-btn{position:absolute;bottom:10px;right:10px;width:34px;height:34px;border-radius:7px;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.15);color:var(--chalk);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;backdrop-filter:blur(6px);}
.no-signal{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:#050506;}
.no-signal-txt{font-family:var(--fm);font-size:10px;letter-spacing:2px;color:var(--chalk4);text-transform:uppercase;}

/* CLIPS */
.clips-section{display:none;padding:0 20px;}

/* Filtros */
.clips-filters{margin-bottom:14px;}
.filter-row{display:flex;gap:8px;margin-bottom:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.filter-row::-webkit-scrollbar{display:none;}
.filter-pill{flex-shrink:0;padding:6px 14px;border-radius:20px;font-family:var(--fm);font-size:10px;letter-spacing:1px;border:1px solid var(--wire);background:var(--ink2);color:var(--chalk3);cursor:pointer;transition:all .2s;white-space:nowrap;}
.filter-pill.active{background:var(--neon3);border-color:rgba(232,255,71,.3);color:var(--neon);}

/* Clips agrupados */
.clips-day-group{margin-bottom:20px;}
.day-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.day-label{font-family:var(--f);font-size:13px;font-weight:500;letter-spacing:1px;color:var(--chalk2);}
.day-line{flex:1;height:1px;background:var(--wire);}
.day-count{font-family:var(--fm);font-size:9px;color:var(--chalk3);padding:2px 8px;border:1px solid var(--wire);border-radius:10px;}

.clip-row{display:flex;gap:0;background:var(--ink2);border:1px solid var(--wire);border-radius:10px;overflow:hidden;cursor:pointer;transition:all .2s;margin-bottom:8px;}
.clip-row:active{transform:scale(.98);}
.clip-thumb{width:100px;height:64px;flex-shrink:0;background:var(--ink);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.clip-thumb-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:10px 10px;}
.clip-play{position:absolute;width:28px;height:28px;border-radius:50%;background:rgba(232,255,71,.12);border:1px solid rgba(232,255,71,.35);display:flex;align-items:center;justify-content:center;}
.clip-info{flex:1;padding:10px 12px;min-width:0;}
.clip-name{font-family:var(--fm);font-size:10px;color:var(--chalk2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;}
.clip-meta{font-size:11px;color:var(--chalk3);display:flex;gap:8px;flex-wrap:wrap;}
.clip-court-tag{font-family:var(--fm);font-size:9px;padding:1px 6px;border-radius:3px;background:var(--neon3);color:var(--neon);border:1px solid rgba(232,255,71,.2);}
.clip-actions{display:flex;align-items:center;padding-right:12px;}
.clip-dl{width:28px;height:28px;border-radius:6px;background:var(--ink3);border:1px solid var(--wire);display:flex;align-items:center;justify-content:center;color:var(--chalk3);text-decoration:none;font-size:13px;}
.clips-empty{padding:40px 0;text-align:center;color:var(--chalk3);font-size:13px;font-family:var(--fm);letter-spacing:1px;}

/* SCHEDULE */
.schedule-section{padding:20px;padding-bottom:calc(20px + var(--safe-b));}
.court-schedule-group{margin-bottom:24px;}
.court-schedule-hdr{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.court-schedule-name{font-family:var(--f);font-size:14px;font-weight:600;letter-spacing:1px;color:var(--chalk);}
.match-card{background:var(--ink2);border:1px solid var(--wire);border-radius:10px;padding:14px;margin-bottom:8px;position:relative;overflow:hidden;transition:all .2s;}
.match-card.live{border-color:rgba(232,255,71,.35);background:var(--ink3);}
.match-card.live::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--neon);}
.match-card.past{opacity:.4;}
.match-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.match-time{font-family:var(--fm);font-size:10px;color:var(--chalk3);}
.badge-live{display:flex;align-items:center;gap:5px;padding:3px 8px;background:var(--red2);border:1px solid rgba(255,69,69,.25);border-radius:3px;}
.badge-live-dot{width:4px;height:4px;border-radius:50%;background:var(--red);animation:pulse 1.4s infinite;}
.badge-live-txt{font-family:var(--fm);font-size:8px;letter-spacing:2px;color:var(--red);}
.badge-next{font-family:var(--fm);font-size:8px;letter-spacing:2px;color:var(--neon);padding:3px 8px;background:var(--neon3);border:1px solid rgba(232,255,71,.2);border-radius:3px;}
.badge-done{font-family:var(--fm);font-size:8px;color:var(--chalk3);}
.match-cat{font-family:var(--fm);font-size:9px;letter-spacing:2px;color:var(--neon);margin-bottom:3px;}
.match-group{font-size:11px;color:var(--chalk3);margin-bottom:8px;}
.match-teams{display:flex;align-items:center;gap:8px;}
.match-team{flex:1;}
.match-players{font-family:var(--f);font-size:12px;font-weight:500;line-height:1.4;}
.match-vs{font-family:var(--f);font-size:10px;letter-spacing:2px;color:var(--chalk4);}

/* MODAL */
.vmodal{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.93);display:none;flex-direction:column;backdrop-filter:blur(8px);}
.vmodal.open{display:flex;}
.vmodal-bar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;padding-top:calc(16px + env(safe-area-inset-top,0px));}
.vmodal-name{font-family:var(--fm);font-size:11px;color:var(--chalk3);}
.vmodal-close{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.08);border:none;color:var(--chalk);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.vmodal video{flex:1;width:100%;object-fit:contain;background:#000;}
.vmodal-foot{padding:14px 20px;padding-bottom:calc(14px + var(--safe-b));display:flex;gap:10px;}
.vmodal-btn{flex:1;padding:13px;border-radius:10px;font-family:var(--fb);font-size:13px;font-weight:500;cursor:pointer;border:none;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center;}
.vmodal-dl{background:var(--neon);color:var(--ink);}
.vmodal-back{background:var(--ink3);color:var(--chalk);border:1px solid var(--wire2);}
</style>

<script async src="https://www.googletagmanager.com/gtag/js?id=G-MZ3LNFYFSV"></script>

</script>
</head>
<body>

<nav class="nav">
  <div class="nav-brand"><div class="nav-dot"></div><div class="nav-logo">PICALE</div></div>
  <div style="display:flex;align-items:center;gap:12px;">
    <div style="font-family:var(--fm);font-size:9px;letter-spacing:2px;color:var(--chalk3);">DUO PADEL PARK</div>
    <div class="nav-clock" id="navClock">--:--:--</div>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <div class="hero-bg"></div><div class="hero-glow"></div>
  <div class="hero-body" id="heroBody">
    <div class="no-live"><div class="no-live-icon">🎾</div><div class="no-live-txt">CARGANDO</div></div>
  </div>
</div>

<!-- COURTS -->
<div class="courts-section">
  <div class="section-label">Canchas</div>
  <div class="courts-scroll">
    <div class="court-card active" id="cc-cancha2" onclick="selectCourt('cancha2',this)">
      <div class="court-indicator"></div>
      <div class="court-thumb">
        <img src="/assets/images.png" style="width:80%;height:80%;object-fit:contain;position:relative;z-index:1;" alt="DUO Padel Park">
        <div class="court-live-tag"><div class="court-live-dot"></div><span class="court-live-label">LIVE</span></div>
      </div>
      <div class="court-info"><div class="court-name">Cancha 2</div><div class="court-sub">TOSSA · En vivo</div></div>
    </div>
    <div class="court-card" id="cc-cancha3" onclick="selectCourt('cancha3',this)">
      <div class="court-indicator"></div>
      <div class="court-thumb">
        <img src="/assets/images.png" style="width:80%;height:80%;object-fit:contain;position:relative;z-index:1;" alt="DUO Padel Park">
      </div>
      <div class="court-info"><div class="court-name">Cancha 3</div><div class="court-sub" id="c3sub">RUBA · Configurando</div></div>
    </div>
  </div>
</div>

<!-- STREAM + CLIPS -->
<div class="stream-section">
  <div class="tabs">
    <button class="tab active" id="tab-live" onclick="switchTab('live')">● EN VIVO</button>
    <button class="tab" id="tab-clips" onclick="switchTab('clips')">▶ CLIPS</button>
    <button class="tab" id="tab-schedule" onclick="switchTab('schedule')">📋 PROGRAMA</button>
  </div>

  <div id="panel-live">
    <div class="stream-wrap">
      <video id="liveVideo" autoplay muted playsinline></video>
      <div class="sc tl"></div><div class="sc tr"></div><div class="sc bl"></div><div class="sc br"></div>
      <button class="fs-btn" onclick="toggleFs()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M1 5V1h4M9 1h4v4M13 9v4h-4M5 13H1v-4"/></svg>
      </button>
      <div class="no-signal" id="noSignal">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none" stroke="rgba(244,240,232,.12)" stroke-width="1.2"><rect x="2" y="7" width="23" height="16" rx="2"/><path d="M25 14.5l9-5.5v14l-9-5.5"/></svg>
        <div class="no-signal-txt">Conectando...</div>
      </div>
    </div>
  </div>

  <div class="clips-section" id="panel-clips">
    <div class="clips-filters">
      <!-- Filtro por día -->
      <div class="filter-row" id="dayFilters"></div>
      <!-- Filtro por cancha -->
      <div class="filter-row" id="courtFilters">
        <div class="filter-pill active" onclick="setCourtFilter('all',this)">Todas las canchas</div>
        <div class="filter-pill" onclick="setCourtFilter('cancha2',this)">Cancha 2</div>
        <div class="filter-pill" onclick="setCourtFilter('cancha3',this)">Cancha 3</div>
      </div>
    </div>
    <div id="clipsContainer"></div>
  </div>

  <div style="display:none;" id="panel-schedule">
    <div class="schedule-section" style="padding:0;">
      <div id="scheduleGrid"></div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="vmodal" id="vmodal">
  <div class="vmodal-bar">
    <div class="vmodal-name" id="vmodalName">—</div>
    <button class="vmodal-close" onclick="closeModal()">×</button>
  </div>
  <video id="vmodalVideo" controls playsinline></video>
  <div class="vmodal-foot" style="flex-wrap:wrap;gap:8px;">
    <button class="vmodal-btn vmodal-back" onclick="closeModal()" style="flex:1;min-width:100px;">← Volver</button>
    <button class="vmodal-btn" id="vmodalShare" onclick="shareCurrentClip()" style="flex:1;min-width:100px;background:rgba(37,211,102,.15);color:#25D366;border:1px solid rgba(37,211,102,.3);">↗ Compartir</button>
    <a class="vmodal-btn vmodal-dl" id="vmodalDl" download style="flex:1;min-width:100px;">↓ Descargar</a>
  </div>
</div>

<script>
// ═══ CONFIG ═══════════════════════════════
const CLOUD_API = 'https://api.picalereplay.com';
const COURTS = {
  cancha2: {
    name: 'Cancha 2', sub: 'TOSSA',
    hls: 'https://api.picalereplay.com/hls/7bcdb57bcfe843f5/index.m3u8',
    courtId: '6ee6d28e-75c3-4cf4-87d0-6d052fb81ab4',
    live: true
  },
  cancha3: {
    name: 'Cancha 3', sub: 'RUBA',
    hls: '', // agregar cuando esté lista
    courtId: '', // agregar cuando esté lista
    live: false
  }
};
let activeCourt = 'cancha2';
let hlsInstance = null;
let allClips = [];
let activeDay = 'today';
let activeCourtFilter = 'all';

// ═══ HORARIOS ═══════════════════════════
const schedule = {
  cancha2: [
    {startTime:"11:30",endTime:"13:00",category:"Primera",group:"Grupo A",teamA:["Adolfo Schraidt","Luis Mario Campa"],teamB:["Jesus Tadeo Mendivil","Damian Avendaño"]},
    {startTime:"13:00",endTime:"14:30",category:"Cuarta Femenil",group:"Grupo A",teamA:["Valeria Rodriguez","Olga Diazbrown"],teamB:["Natty Schnierle","Paola Borquez"]},

// ═══ CLOCK ═══════════════════════════════
function tickClock(){
  const n=new Date();
  document.getElementById('navClock').textContent=
    String(n.getHours()).padStart(2,'0')+':'+
    String(n.getMinutes()).padStart(2,'0')+':'+
    String(n.getSeconds()).padStart(2,'0');
}

// ═══ TIEMPO ══════════════════════════════
function timeToMins(t){const[h,m]=t.split(':').map(Number);return h*60+m;}
function nowMins(){const n=new Date();return n.getHours()*60+n.getMinutes();}
function getStatus(m){
  const s=timeToMins(m.startTime),e=timeToMins(m.endTime),n=nowMins();
  if(n>=s&&n<e)return'live';
  if(n<s)return'upcoming';
  return'past';
}

// ═══ HERO ════════════════════════════════
function renderHero(){
  const matches = (schedule[activeCourt]||[]).map(m=>({...m,court:activeCourt}));
  const live = matches.find(m=>getStatus(m)==='live');
  const next = matches.find(m=>getStatus(m)==='upcoming');
  const m = live||next;
  const body = document.getElementById('heroBody');
  if(!m){
    body.innerHTML=`<div class="no-live"><div class="no-live-icon">🏆</div><div class="no-live-txt">SIN PARTIDOS</div><div class="no-live-sub">No hay partidos programados</div></div>`;
    return;
  }
  const isLive=!!live;
  const courtName = activeCourt==='cancha2'?'Cancha 2 TOSSA':'Cancha 3 RUBA';
  body.innerHTML=`
    <div class="live-eyebrow">
      ${isLive
        ?`<div class="live-pill"><div class="live-dot"></div><span class="live-txt">EN VIVO</span></div>`
        :`<div class="live-pill" style="background:var(--neon3);border-color:rgba(232,255,71,.2)"><span style="font-family:var(--fm);font-size:9px;letter-spacing:2px;color:var(--neon)">PRÓXIMO</span></div>`}
      <div class="live-court-badge">${courtName}</div>
    </div>
    <div class="hero-cat">${m.category}</div>
    <div class="hero-match-name">${m.teamA.join(' / ')}<br><span style="color:var(--chalk3)">vs</span> ${m.teamB.join(' / ')}</div>
    <div class="hero-group">${m.group}</div>
    <div class="hero-teams">
      <div class="hero-team">
        <div class="team-side">A</div>
        <div>${m.teamA.map(p=>`<div class="team-player">${p}</div>`).join('')}</div>
      </div>
      <div class="vs-div"><div class="vs-line"></div><div class="vs-txt">VS</div><div class="vs-line"></div></div>
      <div class="hero-team">
        <div class="team-side">B</div>
        <div>${m.teamB.map(p=>`<div class="team-player">${p}</div>`).join('')}</div>
      </div>
    </div>
    <div class="hero-time">
      <div class="hero-time-val">${m.startTime}</div>
      <div style="width:4px;height:4px;border-radius:50%;background:var(--wire2)"></div>
      <div class="hero-time-end">Hasta ${m.endTime}</div>
    </div>`;
}

// ═══ SCHEDULE ════════════════════════════
function renderSchedule(){
  const grid = document.getElementById('scheduleGrid');
  const matches = schedule[activeCourt]||[];
  const courtName = activeCourt==='cancha2'?'Cancha 2 — TOSSA':'Cancha 3 — RUBA';
  const cards = matches.map((m,i)=>{
    const st=getStatus(m);
    const isNextUpcoming = st==='upcoming' && matches.findIndex(x=>getStatus(x)==='upcoming')===i;
    const badge = st==='live'
      ?`<div class="badge-live"><div class="badge-live-dot"></div><span class="badge-live-txt">EN VIVO</span></div>`
      :isNextUpcoming?`<div class="badge-next">PRÓXIMO</div>`
      :st==='past'?`<div class="badge-done">✓</div>`:'';
    return`<div class="match-card ${st==='live'?'live':''} ${st==='past'?'past':''}">
      <div class="match-card-top">
        <div class="match-time">${m.startTime} – ${m.endTime}</div>
        ${badge}
      </div>
      <div class="match-cat">${m.category}</div>
      <div class="match-group">${m.group}</div>
      <div class="match-teams">
        <div class="match-team"><div class="match-players">${m.teamA.join('<br>')}</div></div>
        <div class="match-vs">VS</div>
        <div class="match-team" style="text-align:right"><div class="match-players" style="text-align:right">${m.teamB.join('<br>')}</div></div>
      </div>
    </div>`;
  }).join('');
  grid.innerHTML=`<div class="court-schedule-group">
    <div class="court-schedule-hdr">
      <div class="court-schedule-name">${courtName}</div>
      <div style="flex:1;height:1px;background:var(--wire)"></div>
    </div>
    ${cards}
  </div>`;
}

setInterval(()=>{renderHero();renderSchedule();},60000);
renderHero();

// ═══ COURT SELECT ════════════════════════
function selectCourt(id,el){
  document.querySelectorAll('.court-card').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  activeCourt=id;
  stopHLS();startHLS();
  renderHero();
  if(document.getElementById('tab-schedule').classList.contains('active'))renderSchedule();
  if(document.querySelector('.clips-section').style.display==='block')renderClips();
}

// ═══ TABS ════════════════════════════════
function switchTab(tab){
  ['live','clips','schedule'].forEach(t=>{
    document.getElementById('tab-'+t).classList.toggle('active',t===tab);
    const panel=document.getElementById('panel-'+t);
    if(panel)panel.style.display=t===tab?'block':'none';
  });
  document.querySelector('.clips-section').style.display=tab==='clips'?'block':'none';
  if(tab==='clips'){loadClips();}
  if(tab==='schedule'){renderSchedule();}
}

// ═══ HLS ═════════════════════════════════
function stopHLS(){
  if(hlsInstance){hlsInstance.destroy();hlsInstance=null;}
  const v=document.getElementById('liveVideo');v.pause();v.src='';
}
function startHLS(){
  const court=COURTS[activeCourt];
  const v=document.getElementById('liveVideo');
  const ns=document.getElementById('noSignal');
  if(!court.hls||!court.live){
    ns.style.display='flex';
    ns.querySelector('.no-signal-txt').textContent='Sin stream configurado';
    return;
  }
  ns.style.display='flex';
  if(typeof Hls!=='undefined'&&Hls.isSupported()){
    hlsInstance=new Hls({liveSyncDurationCount:2,liveMaxLatencyDurationCount:5,maxBufferLength:8});
    hlsInstance.loadSource(court.hls);
    hlsInstance.attachMedia(v);
    hlsInstance.on(Hls.Events.MANIFEST_PARSED,()=>{v.play();ns.style.display='none';});
    hlsInstance.on(Hls.Events.ERROR,(e,d)=>{if(d.fatal)setTimeout(startHLS,5000);});
  } else if(v.canPlayType('application/vnd.apple.mpegurl')){
    v.src=court.hls;v.play();ns.style.display='none';
  }
}
startHLS();

function toggleFs(){
  const v=document.getElementById('liveVideo');
  const w=document.querySelector('.stream-wrap');
  if(v.webkitEnterFullscreen){v.webkitEnterFullscreen();return;}
  if(!document.fullscreenElement)(w.requestFullscreen||w.webkitRequestFullscreen).call(w);
  else(document.exitFullscreen||document.webkitExitFullscreen).call(document);
}

// ═══ CLIPS ═══════════════════════════════
async function loadClips(){
  const container=document.getElementById('clipsContainer');
  container.innerHTML=`<div class="clips-empty">Cargando clips...</div>`;

  // Cargar de ambas canchas
  const courtIds = Object.entries(COURTS).filter(([k,v])=>v.courtId).map(([k,v])=>({key:k,id:v.courtId,name:v.name}));
  let clips=[];
  for(const c of courtIds){
    try{
      const r=await fetch(`${CLOUD_API}/api/v1/clips/?court_id=${c.id}&limit=100`);
      const d=await r.json();
      (d.clips||[]).forEach(clip=>clips.push({...clip,courtKey:c.key,courtName:c.name}));
    }catch{}
  }

  allClips=clips.sort((a,b)=>b.created_at-a.created_at);
  buildDayFilters();
  renderClips();
}

function buildDayFilters(){
  const days={};
  allClips.forEach(c=>{
    const d=new Date(c.created_at*1000);
    const key=d.toLocaleDateString('es-MX',{year:'numeric',month:'2-digit',day:'2-digit'});
    if(!days[key])days[key]=0;
    days[key]++;
  });
  const today=new Date().toLocaleDateString('es-MX',{year:'numeric',month:'2-digit',day:'2-digit'});
  const yesterday=new Date(Date.now()-86400000).toLocaleDateString('es-MX',{year:'numeric',month:'2-digit',day:'2-digit'});
  const container=document.getElementById('dayFilters');
  const pills=[
    {key:'all',label:'Todos'},
    {key:'today',label:'Hoy'},
    {key:'yesterday',label:'Ayer'},
    ...Object.keys(days).filter(d=>d!==today&&d!==yesterday).map(d=>({key:d,label:d}))
  ];
  container.innerHTML=pills.map(p=>`
    <div class="filter-pill ${p.key===activeDay?'active':''}" onclick="setDayFilter('${p.key}',this)">
      ${p.label}${days[p.key]?` <span style="opacity:.5">${days[p.key]}</span>`:''}
    </div>`).join('');
}

function setDayFilter(day,el){
  activeDay=day;
  document.querySelectorAll('#dayFilters .filter-pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  renderClips();
}

function setCourtFilter(court,el){
  activeCourtFilter=court;
  document.querySelectorAll('#courtFilters .filter-pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  renderClips();
}

function renderClips(){
  const today=new Date().toLocaleDateString('es-MX',{year:'numeric',month:'2-digit',day:'2-digit'});
  const yesterday=new Date(Date.now()-86400000).toLocaleDateString('es-MX',{year:'numeric',month:'2-digit',day:'2-digit'});

  let filtered=allClips.filter(c=>{
    const d=new Date(c.created_at*1000);
    const dateKey=d.toLocaleDateString('es-MX',{year:'numeric',month:'2-digit',day:'2-digit'});
    if(activeDay==='today'&&dateKey!==today)return false;
    if(activeDay==='yesterday'&&dateKey!==yesterday)return false;
    if(activeDay!=='all'&&activeDay!=='today'&&activeDay!=='yesterday'&&dateKey!==activeDay)return false;
    if(activeCourtFilter!=='all'&&c.courtKey!==activeCourtFilter)return false;
    return true;
  });

  if(!filtered.length){
    document.getElementById('clipsContainer').innerHTML=`<div class="clips-empty">Sin clips para este filtro</div>`;
    return;
  }

  // Agrupar por día
  const groups={};
  filtered.forEach(c=>{
    const d=new Date(c.created_at*1000);
    const dateKey=d.toLocaleDateString('es-MX',{year:'numeric',month:'2-digit',day:'2-digit'});
    const label=dateKey===today?'Hoy':dateKey===yesterday?'Ayer':dateKey;
    if(!groups[label])groups[label]=[];
    groups[label].push(c);
  });

  document.getElementById('clipsContainer').innerHTML=Object.entries(groups).map(([day,clips])=>`
    <div class="clips-day-group">
      <div class="day-header">
        <div class="day-label">${day}</div>
        <div class="day-line"></div>
        <div class="day-count">${clips.length} clips</div>
      </div>
      ${clips.map(c=>{
        const fileUrl=`${CLOUD_API}/api/v1/clips/${c.id}/file`;
        const label=(c.filename||'').replace(/^[a-f0-9-]+_/,'').replace('replay_','').replace('.mp4','');
        const t=new Date(c.created_at*1000).toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
        return`<div class="clip-row" onclick="playClip('${fileUrl}','${c.filename||''}')">
          <div class="clip-thumb">
            <div class="clip-thumb-grid"></div>
            <div class="clip-play"><svg width="11" height="11" viewBox="0 0 11 11" fill="var(--neon)"><path d="M2 1l8 4.5L2 10V1z"/></svg></div>
          </div>
          <div class="clip-info">
            <div class="clip-name">${label||t}</div>
            <div class="clip-meta">
              <span>${c.size_mb} MB</span>
              <span>${t}</span>
              <span class="clip-court-tag">${c.courtName||''}</span>
            </div>
          </div>
          <div class="clip-actions" style="display:flex;gap:6px;align-items:center;padding-right:12px;">
            <a class="clip-dl" href="${fileUrl}" download="${c.filename||'clip.mp4'}" onclick="event.stopPropagation()" title="Descargar">↓</a>
            <button class="clip-dl" onclick="event.stopPropagation();shareClip('${fileUrl}','${c.filename||'clip.mp4'}')" title="Compartir" style="border:none;cursor:pointer;font-size:14px;background:var(--ink3);border:1px solid var(--wire);">↗</button>
          </div>
        </div>`;
      }).join('')}
    </div>`).join('');
}

// ═══ MODAL ═══════════════════════════════
let currentClipUrl='';let currentClipName='';
function playClip(url,name){
  currentClipUrl=url;currentClipName=name||'clip.mp4';
  const v=document.getElementById('vmodalVideo');
  v.src=url;v.play();
  document.getElementById('vmodalName').textContent=(name||'').replace(/^[a-f0-9-]+_/,'').replace('replay_','').replace('.mp4','');
  document.getElementById('vmodalDl').href=url;
  document.getElementById('vmodalDl').download=name||'clip.mp4';
  document.getElementById('vmodal').classList.add('open');
}

function shareCurrentClip(){
  shareClip(currentClipUrl,currentClipName);
}

function shareClip(url,name){
  const label=(name||'clip').replace(/^[a-f0-9-]+_/,'').replace('replay_','').replace('.mp4','');
  const text=`🎾 Mira este replay de pádel: ${label}`;
  if(navigator.share){
    navigator.share({title:'PICALE Replay',text,url}).catch(()=>{});
    return;
  }
  // Fallback desktop — mostrar opciones
  const wa=`https://api.whatsapp.com/send?text=${encodeURIComponent(text+' '+url)}`;
  const tg=`https://t.me/share/url?url=${encodeURIComponent(url)}&text=${encodeURIComponent(text)}`;
  const menu=document.createElement('div');
  menu.style.cssText='position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.7);display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px);';
  menu.innerHTML=`
    <div style="background:#141416;border-radius:16px 16px 0 0;padding:24px 20px;width:100%;max-width:480px;">
      <div style="font-family:var(--f);font-size:14px;letter-spacing:1px;margin-bottom:16px;color:var(--chalk2);">COMPARTIR CLIP</div>
      <div style="display:flex;gap:12px;margin-bottom:16px;">
        <a href="${wa}" target="_blank" style="flex:1;padding:14px;background:rgba(37,211,102,.1);border:1px solid rgba(37,211,102,.25);border-radius:10px;text-align:center;text-decoration:none;">
          <div style="font-size:22px;margin-bottom:4px;">💬</div>
          <div style="font-family:var(--fm);font-size:9px;color:#25D366;letter-spacing:1px;">WHATSAPP</div>
        </a>
        <button onclick="navigator.clipboard.writeText('${url}').then(()=>{this.innerHTML='<div style=\'font-size:22px;margin-bottom:4px;\'>✓</div><div style=\'font-family:var(--fm);font-size:9px;color:var(--neon);letter-spacing:1px;\'>COPIADO</div>'})" style="flex:1;padding:14px;background:rgba(232,255,71,.06);border:1px solid rgba(232,255,71,.2);border-radius:10px;cursor:pointer;">
          <div style="font-size:22px;margin-bottom:4px;">🔗</div>
          <div style="font-family:var(--fm);font-size:9px;color:var(--neon);letter-spacing:1px;">COPIAR LINK</div>
        </button>
        <a href="${tg}" target="_blank" style="flex:1;padding:14px;background:rgba(71,170,255,.1);border:1px solid rgba(71,170,255,.25);border-radius:10px;text-align:center;text-decoration:none;">
          <div style="font-size:22px;margin-bottom:4px;">✈️</div>
          <div style="font-family:var(--fm);font-size:9px;color:#47AAFF;letter-spacing:1px;">TELEGRAM</div>
        </a>
      </div>
      <button onclick="this.parentElement.parentElement.remove()" style="width:100%;padding:12px;background:var(--ink3);border:1px solid var(--wire);border-radius:10px;color:var(--chalk3);font-family:var(--fb);font-size:13px;cursor:pointer;">Cancelar</button>
    </div>`;
  document.body.appendChild(menu);
  menu.addEventListener('click',e=>{if(e.target===menu)menu.remove();});
}
function closeModal(){
  const v=document.getElementById('vmodalVideo');v.pause();v.src='';
  document.getElementById('vmodal').classList.remove('open');
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
</script>
