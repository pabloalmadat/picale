<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>PICALE · Perfil</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="picale.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0A0A0A;--bg2:#111;--bg3:#161616;--bg4:#1c1c1c;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
  --text:#F0EDE6;--muted:rgba(240,237,230,.45);--muted2:rgba(240,237,230,.22);
  --green:#5EE87A;--green-dim:rgba(94,232,122,.12);--green-border:rgba(94,232,122,.25);
  --display:'Bebas Neue',sans-serif;--body:'DM Sans',sans-serif;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--body);overscroll-behavior:none;}

/* ── TOPBAR ── */
.topbar{
  position:sticky;top:0;z-index:100;
  padding:calc(var(--safe-top) + 10px) 16px 10px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(10,10,10,.9);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
}
.topbar-back{background:none;border:none;color:var(--muted);cursor:pointer;padding:8px;display:flex;align-items:center;gap:6px;font-family:var(--body);font-size:13px;text-decoration:none;}
.topbar-title{font-family:var(--display);font-size:18px;letter-spacing:1px;}

/* ── SCROLL ── */
.scroll{overflow-y:auto;padding-bottom:calc(var(--safe-bottom) + 40px);}

/* ── COVER / AVATAR ── */
.profile-cover{
  height:140px;background:linear-gradient(135deg,#0d1f0d 0%,#111 50%,#0a1a1a 100%);
  position:relative;flex-shrink:0;
}
.profile-cover-pattern{
  position:absolute;inset:0;
  background-image:radial-gradient(circle,rgba(94,232,122,.08) 1px,transparent 1px);
  background-size:24px 24px;
}
.avatar-wrap{
  position:absolute;bottom:-36px;left:20px;
}
.avatar{
  width:80px;height:80px;border-radius:50%;
  border:3px solid var(--bg);
  background:var(--bg3);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--display);font-size:32px;color:var(--green);
  overflow:hidden;cursor:pointer;position:relative;
}
.avatar img{width:100%;height:100%;object-fit:cover;}
.avatar-edit{
  position:absolute;inset:0;background:rgba(0,0,0,.5);
  display:none;align-items:center;justify-content:center;
  font-size:20px;border-radius:50%;
}
.avatar:hover .avatar-edit{display:flex;}

/* ── PROFILE INFO ── */
.profile-info{
  padding:48px 20px 20px;
  border-bottom:1px solid var(--border);
}
.profile-name{font-family:var(--display);font-size:28px;letter-spacing:1px;margin-bottom:2px;}
.profile-username{font-size:13px;color:var(--muted);margin-bottom:10px;}
.profile-bio{font-size:14px;color:var(--muted);margin-bottom:16px;line-height:1.5;}
.profile-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;}
.profile-tag{
  padding:4px 12px;background:var(--bg3);border:1px solid var(--border2);
  border-radius:20px;font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px;
}
.profile-tag.green{background:var(--green-dim);border-color:var(--green-border);color:var(--green);}

/* ── STATS ── */
.profile-stats{
  display:flex;gap:0;
  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
  margin-bottom:20px;
}
.stat{
  flex:1;padding:16px 8px;text-align:center;
  border-right:1px solid var(--border);
}
.stat:last-child{border-right:none;}
.stat-num{font-family:var(--display);font-size:24px;letter-spacing:1px;color:var(--green);}
.stat-label{font-size:10px;color:var(--muted);letter-spacing:1px;margin-top:2px;}

/* ── BUTTONS ── */
.btn-edit{
  width:100%;padding:12px;
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:12px;color:var(--text);
  font-family:var(--body);font-size:14px;font-weight:500;
  cursor:pointer;transition:border-color .2s;
}
.btn-edit:hover{border-color:var(--green);}
.btn-logout{
  width:100%;padding:12px;margin-top:8px;
  background:none;border:1px solid rgba(224,82,82,.3);
  border-radius:12px;color:rgba(224,82,82,.7);
  font-family:var(--body);font-size:13px;cursor:pointer;
}

/* ── SECTION ── */
.section{padding:20px 16px 0;}
.section-title{
  font-family:var(--display);font-size:18px;letter-spacing:1px;
  margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;
}
.section-label{font-family:monospace;font-size:10px;color:var(--muted2);letter-spacing:2px;margin-bottom:12px;}

/* ── CLIPS GRID ── */
.clips-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.clip-thumb{
  aspect-ratio:16/9;background:var(--bg3);border-radius:10px;
  overflow:hidden;position:relative;cursor:pointer;
  border:1px solid var(--border);
}
.clip-thumb video{width:100%;height:100%;object-fit:cover;}
.clip-thumb-time{
  position:absolute;bottom:6px;left:8px;
  font-family:var(--display);font-size:13px;
  color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.8);
}
.clip-thumb-play{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.3);font-size:24px;opacity:0;transition:opacity .2s;
}
.clip-thumb:hover .clip-thumb-play{opacity:1;}
.clip-empty{padding:32px;text-align:center;color:var(--muted);font-size:13px;grid-column:1/-1;}

/* ── EDIT MODAL ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.8);
  z-index:500;display:none;align-items:flex-end;justify-content:center;
}
.modal-overlay.open{display:flex;}
.modal{
  width:100%;max-width:500px;
  background:var(--bg2);border-radius:20px 20px 0 0;
  border-top:1px solid var(--border2);
  padding:20px 20px calc(var(--safe-bottom) + 20px);
  max-height:90vh;overflow-y:auto;
}
.modal-title{font-family:var(--display);font-size:20px;letter-spacing:1px;margin-bottom:20px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:10px;color:var(--muted);letter-spacing:1.5px;margin-bottom:6px;font-weight:600;}
.field input,.field select,.field textarea{
  width:100%;padding:11px 14px;
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:10px;color:var(--text);
  font-family:var(--body);font-size:14px;outline:none;
  transition:border-color .2s;-webkit-appearance:none;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--green);}
.field textarea{min-height:80px;resize:none;}
.field select option{background:#1c1c1c;}
.btn-save{
  width:100%;padding:14px;background:var(--green);
  border:none;border-radius:12px;
  color:#0A0A0A;font-family:var(--display);font-size:18px;letter-spacing:2px;
  cursor:pointer;margin-top:8px;
}
.btn-cancel{
  width:100%;padding:12px;background:none;
  border:1px solid var(--border);border-radius:12px;
  color:var(--muted);font-family:var(--body);font-size:13px;
  cursor:pointer;margin-top:8px;
}

/* ── VIDEO MODAL ── */
.vmodal{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:600;display:none;flex-direction:column;}
.vmodal.open{display:flex;}
.vmodal-bar{height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0;}
.vmodal-close{background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer;}
.vmodal video{width:100%;flex:1;object-fit:contain;background:#000;}

/* ── LOADER ── */
#loader{position:fixed;inset:0;background:var(--bg);z-index:400;display:flex;align-items:center;justify-content:center;}
.loader-logo{font-family:var(--display);font-size:40px;letter-spacing:4px;}
.loader-logo span{color:var(--green);}
@keyframes spin{to{transform:rotate(360deg);}}
.spinner-sm{width:20px;height:20px;border:2px solid rgba(255,255,255,.1);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto;}
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader"><div class="loader-logo">PI<span>.</span></div></div>

<!-- TOPBAR -->
<div class="topbar">
  <a class="topbar-back" onclick="history.back()">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M10 3L6 8l4 5"/></svg>
    Atrás
  </a>
  <div class="topbar-title" id="topbar-title">PERFIL</div>
  <div id="auth-btn-container"></div>
</div>

<div class="scroll">
  <!-- COVER -->
  <div class="profile-cover">
    <div class="profile-cover-pattern"></div>
    <div class="avatar-wrap">
      <div class="avatar" id="avatar" onclick="isOwnProfile && openEditModal()">
        <span id="avatar-initial">?</span>
        <div class="avatar-edit">✏️</div>
      </div>
    </div>
  </div>

  <!-- INFO -->
  <div class="profile-info">
    <div class="profile-name" id="profile-name">—</div>
    <div class="profile-username" id="profile-username"></div>
    <div class="profile-bio" id="profile-bio" style="display:none;"></div>
    <div class="profile-tags" id="profile-tags"></div>
    <div id="profile-actions"></div>
  </div>

  <!-- STATS -->
  <div class="profile-stats">
    <div class="stat">
      <div class="stat-num" id="stat-clips">0</div>
      <div class="stat-label">CLIPS</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-likes">0</div>
      <div class="stat-label">LIKES</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-torneos">0</div>
      <div class="stat-label">TORNEOS</div>
    </div>
  </div>

  <!-- CLIPS -->
  <div class="section">
    <div class="section-label">CLIPS RECLAMADOS</div>
    <div class="clips-grid-2" id="clips-grid">
      <div class="clip-empty"><div class="spinner-sm"></div></div>
    </div>
  </div>

  <div style="height:32px;"></div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-title">EDITAR PERFIL</div>

    <!-- PHOTO UPLOAD -->
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px;">
      <div class="avatar" style="width:64px;height:64px;font-size:24px;flex-shrink:0;" id="edit-avatar-preview">
        <span id="edit-avatar-initial">?</span>
      </div>
      <div>
        <div style="font-size:13px;font-weight:600;margin-bottom:4px;">Foto de perfil</div>
        <button onclick="document.getElementById('photo-input').click()" style="padding:6px 14px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--muted);font-size:12px;cursor:pointer;">Cambiar foto</button>
        <input type="file" id="photo-input" accept="image/*" style="display:none;" onchange="uploadPhoto(this)">
      </div>
    </div>

    <div class="field"><label>NOMBRE</label><input type="text" id="edit-name" placeholder="Tu nombre"></div>
    <div class="field"><label>USUARIO</label><input type="text" id="edit-username" placeholder="@tupicale"></div>
    <div class="field"><label>BIO</label><textarea id="edit-bio" placeholder="Cuéntanos algo..."></textarea></div>
    <div class="field">
      <label>CATEGORÍA</label>
      <select id="edit-categoria">
        <option value="">Sin categoría</option>
        <option value="Open">Open</option>
        <option value="Primera">Primera</option>
        <option value="Segunda">Segunda</option>
        <option value="Tercera">Tercera</option>
        <option value="Cuarta">Cuarta</option>
        <option value="Quinta">Quinta</option>
        <option value="Sexta">Sexta</option>
        <option value="Femenil Open">Femenil Open</option>
        <option value="Femenil Primera">Femenil Primera</option>
        <option value="Femenil Segunda">Femenil Segunda</option>
        <option value="Femenil Tercera">Femenil Tercera</option>
      </select>
    </div>
    <div class="field"><label>CIUDAD</label><input type="text" id="edit-ciudad" placeholder="Ciudad Obregón, Sonora"></div>

    <button class="btn-save" onclick="saveProfile()">GUARDAR</button>
    <button class="btn-cancel" onclick="closeEditModal()">Cancelar</button>
  </div>
</div>

<!-- VIDEO MODAL -->
<div class="vmodal" id="vmodal">
  <div class="vmodal-bar">
    <div style="font-size:11px;color:var(--muted);font-family:monospace;letter-spacing:1px;" id="vmodal-title">—</div>
    <button class="vmodal-close" onclick="closeVModal()">×</button>
  </div>
  <video id="modal-video" controls playsinline></video>
</div>

<script>
var CLOUD = PICALE.CLOUD;
var isOwnProfile = false;
var profileUser = null;

// ── INIT ──
function init() {
  PICALE.renderAuthBtn('auth-btn-container', 'perfil.html');

  var params = new URLSearchParams(window.location.search);
  var username = params.get('u');
  var userId = params.get('id');
  var currentUser = PICALE.getUser();

  // No params = own profile
  if (!username && !userId) {
    if (!currentUser) {
      window.location.href = 'auth.html?redirect=perfil.html';
      return;
    }
    loadProfile(null, currentUser.id, true);
  } else if (username) {
    var isOwn = currentUser && currentUser.username === username;
    loadProfile(username, null, isOwn);
  } else {
    var isOwn = currentUser && currentUser.id === userId;
    loadProfile(null, userId, isOwn);
  }
}

function loadProfile(username, userId, isOwn) {
  isOwnProfile = isOwn;
  var url = username
    ? CLOUD + '/api/v1/auth/profile/' + username
    : CLOUD + '/api/v1/auth/me';

  var headers = {};
  if (PICALE.getToken()) headers['Authorization'] = 'Bearer ' + PICALE.getToken();

  fetch(url, {headers: headers})
    .then(function(r) { return r.json(); })
    .then(function(user) {
      profileUser = user;
      renderProfile(user, isOwn);
      loadUserClips(user.id);
      hideLoader();
    })
    .catch(function() {
      hideLoader();
      document.getElementById('profile-name').textContent = 'Perfil no encontrado';
    });
}

function hideLoader() {
  var l = document.getElementById('loader');
  l.style.opacity = '0';
  l.style.transition = 'opacity .3s';
  setTimeout(function(){ l.style.display = 'none'; }, 300);
}

function renderProfile(user, isOwn) {
  var name = user.name || user.username || user.email.split('@')[0];
  var initial = name[0].toUpperCase();

  document.title = 'PICALE · ' + name;
  document.getElementById('topbar-title').textContent = isOwn ? 'MI PERFIL' : name.toUpperCase();
  document.getElementById('profile-name').textContent = name;

  if (user.username) {
    document.getElementById('profile-username').textContent = '@' + user.username;
  }

  if (user.bio) {
    var bioEl = document.getElementById('profile-bio');
    bioEl.textContent = user.bio;
    bioEl.style.display = 'block';
  }

  // Avatar
  var avatarEl = document.getElementById('avatar');
  var initialEl = document.getElementById('avatar-initial');
  document.getElementById('edit-avatar-initial').textContent = initial;
  if (user.photo_url) {
    avatarEl.innerHTML = '<img src="' + user.photo_url + '" alt=""><div class="avatar-edit">✏️</div>';
  } else {
    initialEl.textContent = initial;
  }

  // Tags
  var tags = [];
  if (user.categoria) tags.push({text: user.categoria, green: true});
  if (user.ciudad) tags.push({text: '📍 ' + user.ciudad, green: false});
  if (user.club_id) tags.push({text: '🎾 DUO Padel Park', green: false});
  document.getElementById('profile-tags').innerHTML = tags.map(function(t) {
    return '<span class="profile-tag' + (t.green ? ' green' : '') + '">' + t.text + '</span>';
  }).join('');

  // Actions
  var actionsEl = document.getElementById('profile-actions');
  if (isOwn) {
    actionsEl.innerHTML =
      '<button class="btn-edit" onclick="openEditModal()">✏️ Editar perfil</button>'
      + '<button class="btn-logout" onclick="PICALE.logout()">Cerrar sesión</button>';
    // Pre-fill edit form
    document.getElementById('edit-name').value = user.name || '';
    document.getElementById('edit-username').value = user.username || '';
    document.getElementById('edit-bio').value = user.bio || '';
    document.getElementById('edit-categoria').value = user.categoria || '';
    document.getElementById('edit-ciudad').value = user.ciudad || '';
  }
}

function loadUserClips(userId) {
  fetch(CLOUD + '/api/v1/social/users/' + userId + '/clips')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var clips = d.clips || [];
      document.getElementById('stat-clips').textContent = clips.length;
      renderClipsGrid(clips);
    })
    .catch(function() {
      document.getElementById('clips-grid').innerHTML = '<div class="clip-empty">Sin clips aún</div>';
    });
}

function renderClipsGrid(clips) {
  var grid = document.getElementById('clips-grid');
  if (!clips.length) {
    grid.innerHTML = '<div class="clip-empty">No has reclamado clips aún.<br><br><a href="feed.html" style="color:var(--green);text-decoration:none;">Ver el feed →</a></div>';
    return;
  }
  grid.innerHTML = clips.map(function(c) {
    var time = c.created_at ? new Date(c.created_at * 1000).toLocaleTimeString('es-MX', {hour:'2-digit', minute:'2-digit'}) : '';
    return '<div class="clip-thumb" onclick="playClip(\'' + c.url + '\',\'' + time + '\')">'
      + '<video src="' + c.url + '" preload="metadata"></video>'
      + '<div class="clip-thumb-play">▶</div>'
      + '<div class="clip-thumb-time">' + time + '</div>'
      + '</div>';
  }).join('');
}

// ── VIDEO MODAL ──
function playClip(url, title) {
  var v = document.getElementById('modal-video');
  var m = document.getElementById('vmodal');
  document.getElementById('vmodal-title').textContent = title;
  v.src = url;
  m.classList.add('open');
  v.play();
}
function closeVModal() {
  var v = document.getElementById('modal-video');
  var m = document.getElementById('vmodal');
  m.classList.remove('open');
  v.pause(); v.src = '';
}

// ── EDIT MODAL ──
function openEditModal() {
  document.getElementById('edit-modal').classList.add('open');
}
function closeEditModal() {
  document.getElementById('edit-modal').classList.remove('open');
}

function saveProfile() {
  var body = {
    name: document.getElementById('edit-name').value.trim(),
    username: document.getElementById('edit-username').value.trim().replace('@','') || null,
    bio: document.getElementById('edit-bio').value.trim() || null,
    categoria: document.getElementById('edit-categoria').value || null,
    ciudad: document.getElementById('edit-ciudad').value.trim() || null,
  };

  fetch(CLOUD + '/api/v1/auth/me', {
    method: 'PUT',
    headers: {'Content-Type':'application/json','Authorization':'Bearer ' + PICALE.getToken()},
    body: JSON.stringify(body)
  })
  .then(function(r) { return r.json(); })
  .then(function(user) {
    // Update localStorage
    var stored = PICALE.getUser() || {};
    stored.name = user.name;
    stored.username = user.username;
    stored.photo_url = user.photo_url;
    localStorage.setItem('picale_user', JSON.stringify(stored));
    closeEditModal();
    renderProfile(user, true);
    PICALE.showToast('Perfil actualizado ✓');
  })
  .catch(function() { PICALE.showToast('Error al guardar'); });
}

function uploadPhoto(input) {
  var file = input.files[0];
  if (!file) return;
  var form = new FormData();
  form.append('file', file);
  PICALE.showToast('Subiendo foto...');
  fetch(CLOUD + '/api/v1/auth/me/photo', {
    method: 'POST',
    headers: {'Authorization': 'Bearer ' + PICALE.getToken()},
    body: form
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    if (d.photo_url) {
      var avatar = document.getElementById('avatar');
      avatar.innerHTML = '<img src="' + d.photo_url + '" alt=""><div class="avatar-edit">✏️</div>';
      var editPreview = document.getElementById('edit-avatar-preview');
      editPreview.innerHTML = '<img src="' + d.photo_url + '" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">';
      var stored = PICALE.getUser() || {};
      stored.photo_url = d.photo_url;
      localStorage.setItem('picale_user', JSON.stringify(stored));
      PICALE.showToast('Foto actualizada ✓');
    }
  })
  .catch(function() { PICALE.showToast('Error al subir foto'); });
}

init();
</script>
</body>
</html>
